<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Nihal Patidar" />
    <meta
      name="desc"
      content="This is a simple and intuitive weather application for Regional forcasting"
    />
    <title>Weather App</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Playfair+Display:wght@700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="output.css" />
    <link rel="icon" href="images/logo-2.jpg" />
    <link rel="stylesheet" href="input.css" />
  </head>
  <body
    class="bg-gradient-to-br from-blue-500 to-cyan-500 flex items-center justify-center min-h-screen w-full overflow-x-hidden "
  >
    <!-- Innner Main-->
    <div class="w-full bg-white rounded-2xl p-2 min-h-screen">
      <!-- Header -->
      <h1 class="text-2xl font-bold italic text-gray-600 text-center p-4 mb-6"><strong>Weather DashBoard</strong>
        
      </h1>

      <div class="flex flex-col gap-4">
        <!-- Search Area Header-->
        <div class="flex flex-col md:flex-row gap-2 relative w-fit mx-auto">
          <!-- <label for="city_name">Enter a city Name</label> -->
          <div
            class="outline-2 flex justify-between items-center outline-cyan-500 py-1 px-2 rounded-xl text-cyan-500 font-semibold"
            id="search_area"
          >
            <input
              class="capitalize px-4 py-1 focus:outline-none"
              id="input_city_name"
              placeholder="Enter the city Name"
            />
            <i class="fa-solid fa-bars text-xl" id="drop_down_bar"></i>
          </div>
          <div
            id="recent_city_dropdown"
            class="h-48 w-80 hidden absolute top-10"
          >
            <!-- recent search box -->
            <div
              id="recent_search_box"
              class="flex flex-col gap-1 w-full h-full border rounded-md p-2 bg-white shadow-sm"
            ></div>
          </div>

          <div class="flex gap-3 justify-between items-center text-blue-500">
            <button
              class="bg-cyan-500 hover:bg-blue-500 rounded-xl text-center px-4 py-2 text-white font-bold w-fit"
              id="search_by_city"
            >
              <i class="fa-solid fa-arrow-right"></i> Search
            </button>
            <i class="fa-solid">OR</i>
            <button
              class="bg-cyan-500 hover:bg-blue-500 rounded-xl text-center px-4 py-2 text-white font-bold w-fit"
              id="curr_loc_btn"
            >
              <i class="fa-solid fa-location-crosshairs"></i> Current Location
            </button>
          </div>
        </div>

        <!-- Todays Weather Information Section -->
        <div class="flex flex-col w-full">
          <!-- Utility Function like Unit Toggle , Open 5 Day Forcast , Tomorrow and Yesterday Visit -->
          <div
            class="flex justify-evenly md:justify-start items-center bg-gray-100 rounded-md py-1 px-4 gap-0 md:gap-4"
            id="btn-f-container"
          >
            <button
              class="btn-f-utility bg-gray-300 text-gray-600"
              id="btn_today"
            >
              Todays
            </button>
            <!--Shows that Current Dashboard shows todays weather Information -->
            <button
              class="btn-f-utility bg-gray-300 text-gray-600"
              id="btn_tomorrow"
            >
              Tommorrow
            </button>
            <!-- User can click to view Tommorrow information -->
            <!-- <button class="btn-f"> 5 Days </button> -->
            <button class="btn-f-unit bg-gray-300 text-gray-600" id="btn_cel">
              <sup>o</sup> C
            </button>
            <!-- User can toggle the between C and F -->
            <button class="btn-f-unit bg-gray-300 text-gray-600" id="btn_fer">
              <sup>o</sup> F
            </button>
          </div>

          <!-- Weather Information Dashboard with Responsive Design -->
          <!--Using Grid with 2 Rows & 4 Columns on mediuma and large Devices -->
          <!-- Using Grid with 4 Rows & 2 Colums on Small Devices -->
          <div
            class="w-full bg-gray-200 grid grid-cols-2 grid-rows-4 md:grid-cols-4 md:grid-rows-2 gap-1"
            id="info_board"
          >
            <!-- First Item Show City Name , Weather Category like ( Rain, clear , snow ) and Temperature in celsius-->
            <div
              class="bg-gradient-to-br from-cyan-400 to-sky-500 col-span-2 row-span-2 rounded-md flex flex-col p-5 gap-4 h-80 shadow-md"
            >
              <h2
                class="text-2xl font-bold capitalize text-white"
                id="info_city_name"
              >
                City Loading...
              </h2>

              <!-- weather icon container -->
              <div
                class="w-16 h-16 rounded-2xl flex justify-center items-center bg-white/30 backdrop-blur-sm"
                id="day_category"
              >
                <i class="fa-solid fa-sun text-amber-200 text-4xl"></i>
              </div>

              <h3
                class="text-xl font-semibold capitalize text-white flex items-center gap-2"
                id="info_weather_category"
              >
                Loading...
              </h3>

              <h1 class="text-4xl font-bold capitalize flex items-center gap-2">
                <span id="info_weather_temp" class="temp_value text-white"
                  >Loading...</span
                >
                <span class="temp_unit text-white">°C</span>
              </h1>
            </div>

            <!-- Second Item Show Details about Wind like (Speed , Direction) -->
            <!-- Grid Item for Weather Data For Wind -->
            <!-- Grid Item for Weather Data For Wind -->
            <div
              class="col-span-1 info-grid-item rounded-lg flex flex-col p-5 gap-4 bg-white/15 backdrop-blur-md shadow-md border border-white/20 transition-all duration-200 hover:shadow-lg hover:-translate-y-1"
            >
              <!-- heading section for wind -->
              <h2
                class="flex items-center justify-between text-lg font-semibold text-white"
              >
                <span>Wind</span>
                <!-- wind icon -->
                <i class="fa-solid fa-wind text-cyan-200"></i>
              </h2>

              <!-- wind data -->
              <div class="flex flex-col gap-2 text-sm text-gray-100">
                <h2>
                  <span class="opacity-80">Speed :</span>
                  <span id="info_wind_speed" class="font-medium"></span>
                </h2>
              </div>
            </div>

            <!-- Grid Item for Weather Data For Humidity -->
            <div
              class="col-span-1 info-grid-item rounded-lg flex flex-col p-5 gap-4 bg-white/15 backdrop-blur-md shadow-md border border-white/20 transition-all duration-200 hover:shadow-lg hover:-translate-y-1"
            >
              <!-- heading -->
              <h2
                class="flex items-center justify-between text-lg font-semibold text-white"
              >
                <span>Humidity</span>
                <!-- humidity icon -->
                <i class="fa-solid fa-droplet text-blue-300"></i>
              </h2>

              <!-- humidity value -->
              <div class="text-sm text-gray-100">
                <h2>
                  <span id="info_humidity_value" class="font-medium"></span>
                  <span class="opacity-80">%</span>
                </h2>
              </div>
            </div>

            <!-- Grid Item for Weather Data For Pressure -->
            <div
              class="col-span-1 info-grid-item rounded-lg flex flex-col p-5 gap-4 bg-white/15 backdrop-blur-md shadow-md border border-white/20 transition-all duration-200 hover:shadow-lg hover:-translate-y-1"
            >
              <!-- heading -->
              <h2
                class="flex items-center justify-between text-lg font-semibold text-white"
              >
                <span>Pressure</span>
                <!-- pressure icon -->
                <i class="fa-solid fa-gauge text-purple-300"></i>
              </h2>

              <!-- pressure value -->
              <div class="text-sm text-gray-100">
                <h2>
                  <span id="info_pressure_value" class="font-medium"></span>
                  <span class="opacity-80">hPa</span>
                </h2>
              </div>
            </div>

            <!-- Grid Item for Weather Data For Temperature -->
            <div
              class="col-span-1 info-grid-item rounded-lg flex flex-col p-5 gap-4 bg-white/15 backdrop-blur-md shadow-md border border-white/20 transition-all duration-200 hover:shadow-lg hover:-translate-y-1"
            >
              <!-- heading -->
              <h2
                class="flex items-center justify-between text-lg font-semibold text-white"
              >
                <span>Temperature</span>
                <!-- temperature icon -->
                <i class="fa-solid fa-temperature-half text-orange-300"></i>
              </h2>

              <!-- temperature values -->
              <div class="flex flex-col gap-2 text-sm text-gray-100">
                <!-- min temperature -->
                <h2>
                  <span class="opacity-80">Min :</span>
                  <span
                    id="info_min_temp"
                    class="font-medium temp_value"
                  ></span>
                  <span class="temp_unit">°C</span>
                </h2>

                <!-- max temperature -->
                <h2>
                  <span class="opacity-80">Max :</span>
                  <!-- removed extra space in id -->
                  <span
                    id="info_max_temp"
                    class="font-medium temp_value"
                  ></span>
                  <span class="temp_unit">°C</span>
                </h2>
              </div>
            </div>
          </div>
        </div>

        <!-- Extended Forecast Section -->
        <div class="w-full mt-6">
          <!-- heading -->
          <h2 class="text-xl font-semibold mb-4">5 Day Forecast</h2>

          <!-- forecast grid -->
          <div
            id="forecast_container"
            class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-4"
          >
            <!-- Each Card will appear here-->
          </div>
        </div>
      </div>
    </div>

    <!-- Message Box Container -->
    <div
      id="message_box"
      class="fixed top-6 right-6 hidden max-w-sm w-full rounded-md shadow-lg bg-white border-2 border-gray-200 p-4 flex items-start gap-3"
    >
      <!-- icon -->
      <div id="message_icon" class="text-lg mt-1"></div>

      <!-- message content -->
      <div class="flex-1">
        <h3 id="message_title" class="font-semibold text-sm">Message</h3>
        <p id="message_text" class="text-sm text-gray-600"></p>
      </div>

      <!-- close button -->
      <button
        onclick="closeMessageBox()"
        class="text-gray-400 hover:text-gray-600 text-sm"
      >
        ✕
      </button>
    </div>

    <!-- <script src="getApiData.js"></script> -->
    <!-- <script src="searchBar.js"></script> -->
    <!-- <script src="index.js"></script> -->
     <script src="index-org.js"></script>
  </body>
</html>
